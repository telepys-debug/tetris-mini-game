<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Выставка Тетрис</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      background: #1a1a2e;
      overflow: hidden;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f0f1a;
    }

    /* Табы */
    .tabs {
      position: fixed;
      bottom: 0;
      max-width: 500px;
      width: 100%;
      background: #16213e;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #0f3460;
      z-index: 100;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #dfefff;
      font-size: 12px;
      text-align: center;
      padding: 5px 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab-btn.active {
      color: #00d9ff;
    }

    .tab-btn img {
      width: 28px;
      display: block;
      margin: 0 auto 4px;
      opacity: 0.6;
    }

    .tab-btn.active img {
      opacity: 1;
    }

    /* Контенты */
    .tab-content {
      flex: 1;
      overflow: hidden;
      display: none;
      padding: 12px;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
    }

    /* Заголовки */
    .title {
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      padding: 14px;
      border-radius: 20px;
      text-align: center;
      font-weight: bold;
      color: white;
      margin-bottom: 20px;
    }

    /* Рейтинг */
    .period-selector {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 10px;
    }

    .period-btn {
      background: #16213e;
      border: none;
      padding: 10px;
      border-radius: 16px;
      color: white;
      flex: 1;
      cursor: pointer;
    }

    .period-btn.active {
      background: #00b4d8;
    }

    .rating-list {
      background: #16213e;
      border-radius: 20px;
      padding: 10px;
    }

    .rating-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 6px;
      background: #1a1a2e;
      color: #f2f7ff;
    }

    .rating-item.current-user {
      background: #00b4d8;
      color: white;
    }

    .rating-rank {
      font-weight: bold;
      width: 40px;
      color: #ffffff;
    }

    .rating-name {
      flex: 1;
      text-align: left;
      padding-left: 10px;
      color: #e8f4ff;
    }

    /* Игра */
    canvas {
      display: block;
      margin: 0 auto;

      background: #0a0a15;
      border-radius: 16px;

      box-shadow: 0 0 20px rgba(0, 180, 216, 0.3);

      width: min(92vw, 260px);
      aspect-ratio: 1 / 2;
      
      height: auto;
      
      touch-action: none;
    }

    .score-board {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #00d9ff;
      margin: 16px 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: auto;
      padding: 10px 0;
    }

    .control-btn {
      background: #16213e;
      border: none;
      width: 72px;
      height: 72px;
      border-radius: 20px;
      font-size: 28px;
      cursor: pointer;
      color: white;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .control-btn:active {
      background: #00b4d8;
    }

    .start-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      margin-top: auto;
      margin-bottom: 10px;
    }

    /* Профиль */
    .profile-header {
      text-align: center;
      color: #f2f7ff;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #16213e;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .stats-grid {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
    }

    .stat-card {
      background: #1d2b4a;
      padding: 12px;
      border-radius: 16px;
      text-align: center;
      flex: 1;
      margin: 0 5px;
      color: #dce9f5;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #00d9ff;
    }

    .edit-name-btn {
      background: #16213e;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      margin-top: 10px;
      cursor: pointer;
    }

    .achievement {
      background: #1d2b4a;
      padding: 12px;
      border-radius: 12px;
      margin: 8px 0;
      color: #dce9f5;
    }

    .achievement.unlocked {
      background: #00b4d8;
      color: white;
    }

    .history-item {
      background: #1d2b4a;
      padding: 10px;
      border-radius: 12px;
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
      color: #dce9f5;
    }

    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .modal-content {
      background: #16213e;
      padding: 24px;
      border-radius: 24px;
      width: 80%;
      max-width: 300px;
      text-align: center;
    }

    .modal input {
      width: 100%;
      padding: 12px;
      margin: 16px 0;
      border-radius: 16px;
      border: none;
      background: #0f0f1a;
      color: white;
    }

    .modal button {
      padding: 10px 20px;
      margin: 5px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Рейтинг -->
  <div id="rating-tab" class="tab-content active">
  <div class="title">🏆 РЕЙТИНГ ИГРОКОВ</div>

  <div id="my-rank" style="margin-bottom:10px; text-align:center;"></div>

  <div class="period-selector" id="period-selector"></div>
  <div id="rating-list" class="rating-list">Загрузка...</div>
</div>

  <!-- Игра -->
  <div id="game-tab" class="tab-content">
    <div class="title">🎮 ПОСТРОЙ ИННОВАЦИИ</div>
    <div class="score-board">Счёт: <span id="score">0</span></div>
    <canvas id="tetris-canvas" width="240" height="480"></canvas>
    <div class="controls">
      <button class="control-btn" data-move="left">◀</button>
      <button class="control-btn" data-move="rotate">🔄</button>
      <button class="control-btn" data-move="down">▼</button>
      <button class="control-btn" data-move="right">▶</button>
    </div>
    <button id="start-game" class="start-btn">🔄 НОВАЯ ИГРА</button>
  </div>

  <!-- Профиль -->
  <div id="profile-tab" class="tab-content">
    <div class="profile-header">
      <div class="avatar" id="avatar">👤</div>
      <h2 id="user-name">Игрок</h2>
      <button class="edit-name-btn" id="edit-name-btn">✏️ Сменить имя</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="best-score">0</div><div>Лучший счёт</div></div>
      <div class="stat-card"><div class="stat-value" id="games-played">0</div><div>Игр сыграно</div></div>
      <div class="stat-card"><div class="stat-value" id="total-score">0</div><div>Всего очков</div></div>
    </div>
    <div class="title" style="font-size: 14px;">🏅 ДОСТИЖЕНИЯ</div>
    <div id="achievements-list"></div>
    <div class="title" style="font-size: 14px;">📅 ИСТОРИЯ МЕСТ</div>
    <div id="history-list"></div>
  </div>

  <!-- Нижнее меню -->
  <div class="tabs">
    <button class="tab-btn" data-tab="rating">🏆<br>Рейтинг</button>
    <button class="tab-btn" data-tab="game">🎮<br>Игра</button>
    <button class="tab-btn" data-tab="profile">👤<br>Профиль</button>
  </div>
</div>

<!-- Модальное окно смены имени -->
<div id="name-modal" class="modal">
  <div class="modal-content">
    <h3>Сменить имя</h3>
    <input type="text" id="new-name-input" maxlength="20" placeholder="Введите имя">
    <button id="save-name-btn">Сохранить</button>
    <button id="cancel-name-btn">Отмена</button>
  </div>
</div>

<script>
document.addEventListener(
  'touchmove',
  function(e) {
    if (e.scale !== 1) {
      e.preventDefault();
    }
  },
  { passive: false }
);
</script>

<script src="tetris.js"></script>
<script src="app.js"></script>
</body>
</html>
