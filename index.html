<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Академия инноваторов: мини-игра</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #111827 0%, #050816 70%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      touch-action: manipulation;
    }

    .app {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      background: transparent;
      margin: 0 auto;
      position: relative;
    }

    /* Табы */
    .tabs {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100%;
      max-width: 520px;
      background: #16213e;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid #0f3460;
      z-index: 100;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #dfefff;
      font-size: 12px;
      text-align: center;
      padding: 5px 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab-btn.active {
      color: #00d9ff;
    }

    .tab-content {
      display: none;
      padding: 12px;
      padding-bottom: 100px;
      min-height: 100vh;
    }
    
    .tab-content.active {
      display: block;
    }

    /* Рейтинг */
    .title {
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      padding: 14px;
      border-radius: 20px;
      text-align: center;
      font-weight: bold;
      color: white;
      margin-bottom: 20px;
    }

    .rating-list {
      background: #16213e;
      border-radius: 20px;
      padding: 10px;
    }

    .rating-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 6px;
      background: #1a1a2e;
      color: #f2f7ff;
    }

    .rating-item.current-user {
      background: #00b4d8;
      color: white;
    }

    /* Игра - всё внутри этого блока */
    #game-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-container {
      position: relative;
      width: 200px;
      height: 400px;
      margin: 20px auto;
    }

    canvas {
      display: block;
      width: 200px;
      height: 400px;
      background: #0b1020;
      border-radius: 16px;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.18);
    }

    .score-board {
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      color: #38bdf8;
      margin: 12px 0 22px;
      text-shadow: 0 0 25px rgba(56, 189, 248, 0.35);
    }

    .controls {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 120px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 90;
    }

    .control-btn {
      background: #16213e;
      border: none;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      font-size: 22px;
      cursor: pointer;
      color: white;
    }

    .control-btn:active {
      background: #00b4d8;
    }

    .start-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      margin-top: 16px;
    }

    .game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 16px;
      z-index: 50;
    }

    .game-modal {
      width: 85%;
      background: #16213e;
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      color: white;
    }

    .game-modal h2 {
      font-size: 18px;
      margin-bottom: 14px;
    }

    .final-score {
      font-size: 28px;
      font-weight: bold;
      color: #00d9ff;
      margin: 15px 0;
    }

    /* Профиль */
    .profile-header {
      text-align: center;
      color: #f2f7ff;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #16213e;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .stats-grid {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
    }

    .stat-card {
      background: #1d2b4a;
      padding: 12px;
      border-radius: 16px;
      text-align: center;
      flex: 1;
      margin: 0 5px;
      color: #dce9f5;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #00d9ff;
    }

    .edit-name-btn {
      background: #16213e;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      margin-top: 10px;
      cursor: pointer;
    }

    .achievement {
      background: #1d2b4a;
      padding: 12px;
      border-radius: 12px;
      margin: 8px 0;
      color: #dce9f5;
    }

    .achievement.unlocked {
      background: #00b4d8;
      color: white;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .modal-content {
      background: #16213e;
      padding: 24px;
      border-radius: 24px;
      width: 80%;
      max-width: 300px;
      text-align: center;
    }

    .modal input {
      width: 100%;
      padding: 12px;
      margin: 16px 0;
      border-radius: 16px;
      border: none;
      background: #0f0f1a;
      color: white;
    }

    .modal button {
      padding: 10px 20px;
      margin: 5px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="app">
  
  <!-- Рейтинг -->
  <div id="rating-tab" class="tab-content active">
    <div class="title">🏆 РЕЙТИНГ ИГРОКОВ</div>
    <div id="rating-list" class="rating-list">Загрузка...</div>
  </div>

  <!-- Игра - ВСЕ элементы игры только здесь -->
  <div id="game-tab" class="tab-content">
    <div class="title">🎮 ПОСТРОЙ ИННОВАЦИИ</div>

    <div class="score-board">
      Счёт: <span id="score">0</span>
    </div>

    <div class="game-container">
      <canvas id="tetris-canvas" width="200" height="400"></canvas>

      <div id="start-overlay" class="game-overlay">
        <div class="game-modal">
          <h2>🎮 ТЕТРИС</h2>
          <p>Построй инновации и набери максимум очков</p>
          <button id="start-game-btn" class="start-btn">НАЧАТЬ ИГРУ</button>
        </div>
      </div>

      <div id="game-over-overlay" class="game-overlay" style="display:none;">
        <div class="game-modal">
          <h2>🏁 ИГРА ОКОНЧЕНА</h2>
          <p>Ваш результат:</p>
          <div id="final-score" class="final-score">0</div>
          <p id="final-lines"></p>
          <button id="restart-game-btn" class="start-btn">НОВАЯ ИГРА</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" data-move="left">◀</button>
      <button class="control-btn" data-move="rotate">🔄</button>
      <button class="control-btn" data-move="down">▼</button>
      <button class="control-btn" data-move="right">▶</button>
    </div>
  </div>

  <!-- Профиль -->
  <div id="profile-tab" class="tab-content">
    <div class="profile-header">
      <div class="avatar">👤</div>
      <h2 id="user-name">Игрок</h2>
      <button class="edit-name-btn" id="edit-name-btn">✏️ Сменить имя</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="best-score">0</div><div>Лучший счёт</div></div>
      <div class="stat-card"><div class="stat-value" id="games-played">0</div><div>Игр сыграно</div></div>
      <div class="stat-card"><div class="stat-value" id="total-score">0</div><div>Всего очков</div></div>
    </div>
    <div class="title" style="font-size: 14px;">🏅 ДОСТИЖЕНИЯ</div>
    <div id="achievements-list"></div>
  </div>

  <!-- Нижнее меню -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="rating">🏆<br>Рейтинг</button>
    <button class="tab-btn" data-tab="game">🎮<br>Игра</button>
    <button class="tab-btn" data-tab="profile">👤<br>Профиль</button>
  </div>

  <!-- Модальное окно -->
  <div id="name-modal" class="modal">
    <div class="modal-content">
      <h3>Сменить имя</h3>
      <input type="text" id="new-name-input" maxlength="20" placeholder="Введите имя">
      <button id="save-name-btn">Сохранить</button>
      <button id="cancel-name-btn">Отмена</button>
    </div>
  </div>
</div>

<script src="tetris.js"></script>
<script src="app.js"></script>
</body>
</html>
